name: MERN CI

on: 
  push: 
    branches: [main]

jobs:
  mongo-init:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo
        ports: ["27017:27017"]

    steps: 
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Packages
        working-directory: ./backend
        run: npm install

      - name: Waiting mongo to be ready
        run: |
          until nc -z localhost 27017; do
            echo "waiting for mongodb..."
            sleep 2
          done 
            echo "mongodb is up"

      - name: Running Seed Script
        working-directory: ./backend
        run: |
          node seedTasksData.js
  test:
    runs-on: ubuntu-latest
    needs: mongo-init

    env:
      PORT: ${{ secrets.PORT }}
      MONGO_URI: ${{ secrets.MONGO_URI }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Packages
        working-directory: ./backend
        run: npm install

      - name: run backend test
        working-directory: ./backend
        run: npm test


